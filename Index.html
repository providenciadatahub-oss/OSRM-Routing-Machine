<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>OSRM Routing Machine - Providencia</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    html, body, #viewDiv { height: 100%; width: 100%; margin: 0; padding: 0; }
    #panel { 
      position: absolute; top: 15px; left: 15px; background: white; padding: 15px; 
      border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 10; font-family: sans-serif; 
    }
  </style>
</head>
<body>
  <div id="panel">
    <b>OSRM Routing</b><br>
    <small>Haz clic en dos puntos del mapa para trazar la ruta.</small>
  </div>
  <div id="viewDiv"></div>

  <script>
    require([
      "esri/Map", 
      "esri/views/MapView", 
      "esri/Graphic", 
      "esri/geometry/Polyline"
    ], function(Map, MapView, Graphic, Polyline) {
      
      const map = new Map({ basemap: "streets-navigation-vector" });
      
      const view = new MapView({ 
        container: "viewDiv", 
        map: map, 
        center: [-70.614, -33.423], // Centrado en Providencia
        zoom: 14 
      });

      let points = [];

      view.on("click", async (event) => {
        // Si ya hay 2 puntos, limpiamos el mapa para empezar de nuevo
        if (points.length >= 2) {
            points = [];
            view.graphics.removeAll();
        }

        const lon = event.mapPoint.longitude;
        const lat = event.mapPoint.latitude;
        
        points.push({ lat: lat, lon: lon });

        // Añadir marcador visual (punto naranja)
        view.graphics.add(new Graphic({
          geometry: event.mapPoint,
          symbol: { 
            type: "simple-marker", 
            color: "#FF5722", 
            outline: { color: "white", width: 2 } 
          }
        }));

        // Al completar el segundo punto, llamamos al proxy
        if (points.length === 2) {
          // Formateamos las coordenadas para OSRM (lon,lat;lon,lat)
          const coordsString = `${points[0].lon},${points[0].lat};${points[1].lon},${points[1].lat}`;
          
          try {
            // Llamada directa a tu función de Netlify
            const res = await fetch(`/.netlify/functions/index?coords=${coordsString}`);
            
            if (!res.ok) {
              const errInfo = await res.json();
              console.error("Error del servidor:", errInfo);
              return;
            }
            
            const data = await res.json();

            if (data.features && data.features.length > 0) {
              // Creamos la línea de la ruta
              const routeGraphic = new Graphic({
                geometry: new Polyline(data.features[0].geometry),
                symbol: { 
                    type: "simple-line", 
                    color: "#007AFF", 
                    width: 4 
                },
                attributes: data.features[0].attributes,
                popupTemplate: { 
                  title: "Información de Ruta (OSRM)", 
                  content: "<b>Distancia:</b> {Distancia_km} km<br><b>Tiempo estimado:</b> {Tiempo_min} min" 
                }
              });

              view.graphics.add(routeGraphic);
              
              // Abrimos el popup automáticamente en el último punto clicado
              view.popup.open({ 
                features: [routeGraphic], 
                location: event.mapPoint 
              });
            }
          } catch (err) {
            console.error("Error en la petición de ruteo:", err);
          }
        }
      });
    });
  </script>
</body>
</html>
